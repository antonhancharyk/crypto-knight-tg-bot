version: "3.9"
services:
  tgbot:
    container_name: crypto-knight-tgbot
    image: antgoncharik/crypto-knight-tgbot
    env_file:
      - .env
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s